<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes</title>
    <link rel="stylesheet" href="/styles/global.css" />
    <link rel="stylesheet" href="/styles/regClientes.css" />
    <link rel="stylesheet" href="/styles/infoPerfil.css" />
  </head>
  <body>
    <div id="barraNav"></div>
    <div class="containerClientes">
      <div id="infoPerfil"></div>

      <!--cuadro registro de clientes-->
      <h2>CLIENTES</h2>
      <div class="cuadro">
        <h5>INFORMACIÓN PERSONAL</h5>
        <form action="" class="formRClientes" id="formClientes">
          <input
            type="text"
            placeholder="Nombres*"
            id="nombresReg"
            required
          /><input
            type="text"
            placeholder="Apellidos*"
            id="apellidosReg"
            required
          />
          <select name="documento" id="tipDocumento" class="tipoDoc">
            <option value="">Tipo de documento</option>
            <option value="cc">Cedula de ciudadanía</option>
            <option value="ce">Cedula de extrangería</option>
            <option value="ti">Targeta de identidad</option>
          </select>
          <input
            type="text"
            placeholder="Número de documento*"
            id="numDoc"
            required
          /><input type="tel" placeholder="Telefono*" id="tlf" required /><input
            type="text"
            placeholder="Ocupación"
            id="ocupacion"
          />
          <hr />
          <div class="infoHabitación">
            <h5>INFORMACIÓN DE ESTADÍA</h5>
            <div class="estadia">
              <div class="dFechas">
                <label for="fEntrada">Fecha de entrada</label>
                <input
                  type="date"
                  name="fechaEnter"
                  id="fEntrada"
                  class="fecha"
                />
              </div>
              <div class="dFechas">
                <label for="fSalida">Fecha de salída</label>
                <input
                  type="date"
                  name="fechaSalida"
                 id="fSalida"
                  class="fecha"
                />
              </div>
              <select name="tipoHab" id="tipoHab" class="tipoHab" >
                <option value="escogetipoH">Tipo de habitación</option>
                <option value="sencillaA">Sencilla/ventilador</option>
                <option value="sencillaV">Sencilla/aire</option>
                <option value="dobleV">Doble/ventilador</option>
                <option value="dobleA">Doble/aire</option>
                <option value="doscamas">Dos camas</option>
              </select>
              
            </div>
          </div>
        </form>
        <div class="botones">
          <button type="reset" class="boton" form="formClientes">
            Cancelar
          </button>
          <button
            type="button"
            class="boton"
            form="formClientes"
            onclick="guardar()"
          >
            Guardar
          </button>
        </div>
      </div>
    </div>
    <script src="/js/componentes.js"></script>
    <script>
      cargarComponente("barraNav", "../components/barraNav.html");
      cargarComponente("infoPerfil", "../components/infoPerfil.html");
    </script>
    <script src="/js/regClientes.js"></script>
  </body>
</html>
