<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio</title>
    <link rel="stylesheet" href="/styles/global.css" />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <script>
// Función genérica para cargar cualquier componente en un contenedor por id
function cargarComponente(idContenedor, rutaArchivo) {
  fetch(rutaArchivo)
    .then(res => res.text())
    .then(html => {
      document.getElementById(idContenedor).innerHTML = html;
    })
    .catch(error => console.error("Error al cargar el componente:", error));
}

// Ejemplos de uso: llama a los componentes que quieras en esta vista
cargarComponente("barraNav", "../components/barraNav.html");
cargarComponente("infoPerfil", "../components/infoPerfil.html");
</script>
    <div id="barraNav"></div>

    <div class="containerInicio">

      <div id="infoPerfil"></div>
      <div class="cardsContainer">

        </div>
        <div class="card" id="card3">

        <div class="card" id="card4">

            <a href=""

        </ul>
      </div>

  </body>
