<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="caja">
      <form action="">
        <h2>LOGIN</h2>
        <input type="text" name="usuario" placeholder="Usuario" required />
        <input
          type="password"
          name="contraseña"
          placeholder="Contraseña"
          required
        />
        <button class="btn" type="submit">INGRESAR</button>
        <p>
          No tienes cuenta,
          <b><a href="form-registro.html">Crea una cuenta.</a></b>
        </p>
      </form>
    </div>
  </body>
</html>
